<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Language Translator</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <i class="fa-solid fa-language"></i>
            <h1>Universal Translator</h1>
        </header>
        
        <div class="wrapper">
            <div class="text-input">
                <textarea spellcheck="false" class="from-text" placeholder="Enter text to translate"></textarea>
                <textarea spellcheck="false" readonly disabled class="to-text" placeholder="Translation will appear here"></textarea>
            </div>
            
            <ul class="controls">
                <li class="row from">
                    <div class="icons">
                        <i id="from" class="fas fa-volume-up"></i>
                        <i id="from" class="fas fa-copy"></i>
                    </div>
                    <select></select>
                </li>
                
                <li class="exchange">
                    <i class="fas fa-exchange-alt"></i>
                </li>
                
                <li class="row to">
                    <select></select>
                    <div class="icons">
                        <i id="to" class="fas fa-copy"></i>
                        <i id="to" class="fas fa-volume-up"></i>
                    </div>
                </li>
            </ul>
        </div>
        
        <button class="translate-btn">Translate Text</button>
    </div>

    <script src="countries.js"></script>
    <script src="script.js"></script>
</body>
</html>
